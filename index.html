<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>emsalleri.com - Akıllı Araç Analizi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border-top: 6px solid #0056b3;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-top: 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="text"]:focus {
            border-color: #0056b3;
            outline: none;
        }
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #004085;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #e9ecef;
            border-radius: 6px;
            text-align: left;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>emsalleri.com 🚗</h1>
        <p>İlan linkini yapıştır, Mankafa Yapay Zeka emsalleriyle kıyaslasın.</p>
        
        <input type="text" id="ilanLinki" placeholder="Örn: https://shbd.io/s/golf-ilan" />
        <button onclick="analizEt()">Emsallerini Sorgula</button>

        <div class="result-box" id="sonucKutusu">
            <!-- Arka plandan (index.js) gelen sonuçlar buraya yazılacak -->
        </div>
    </div>

    <script>
        async function analizEt() {
            const linkInput = document.getElementById('ilanLinki').value;
            const sonucKutusu = document.getElementById('sonucKutusu');
            
            if(!linkInput) {
                alert("Lütfen bir ilan linki girin!");
                return;
            }

            try {
                // Ekrandan aldığımız linki arka plandaki canlı sunucumuza (API) gönderiyoruz
                const cevap = await fetch('/api/analiz-et', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ilanLinki: linkInput })
                });

                const veri = await cevap.json();

                sonucKutusu.style.display = "block";

                if (veri.basarili) {
                    sonucKutusu.innerHTML = `
                        <h3 style="color:#0056b3; margin-top:0;">📊 Canlı Analiz Sonucu</h3>
                        <strong>Araç:</strong> ${veri.aracAdı}<br>
                        <strong>İlan Fiyatı:</strong> ${veri.ilanFiyati}<br>
                        <strong>Piyasa Ortalama:</strong> ${veri.piyasaOrtalamasi}<br>
                        <p style="color:${veri.renk}; font-weight:bold; margin-top:10px;">${veri.durum}</p>
                        <hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
                        <strong>⚠️ Mankafa Yapay Zeka Notu:</strong><br>
                        <small>${veri.kronikSorun}</small>
                    `;
                } else {
                    sonucKutusu.innerHTML = `<span style="color:red; font-weight:bold;">${veri.mesaj}</span>`;
                }

            } catch (hata) {
                console.error("Hata oluştu:", hata);
                alert("Sunucuyla bağlantı kurulurken bir hata oluştu!");
            }
        }
    </script>
</body>
</html>
